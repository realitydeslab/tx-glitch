name: "\U0001F50A Glitch Report"
description: "Submit a trust experience glitch from a completed interview"
title: "[Glitch] "
labels: ["glitch-report", "pending-review"]
body:
  - type: markdown
    attributes:
      value: |
        ## TX Glitch Report
        Submit a trust glitch documented through a Scouter interview.
        All fields map directly to the TX Glitch ethogram schema.

  # === Metadata ===
  - type: input
    id: participant_id
    attributes:
      label: Participant ID
      placeholder: "P-001"
    validations:
      required: true

  - type: input
    id: scouter_id
    attributes:
      label: Scouter ID
      placeholder: "GS-001"
    validations:
      required: true

  - type: input
    id: interview_date
    attributes:
      label: Interview Date
      placeholder: "YYYY-MM-DD"
    validations:
      required: true

  # === System ===
  - type: input
    id: system_name
    attributes:
      label: "System: Name"
      placeholder: "e.g., ChatGPT-4o, Claude 3.5, GitHub Copilot"
    validations:
      required: true

  - type: dropdown
    id: system_type
    attributes:
      label: "System: Type"
      options:
        - Chatbot
        - Coding copilot
        - Voice assistant
        - Autonomous agent
        - Image/video generator
        - Recommendation system
        - Search AI
        - Embodied robot
        - Other
    validations:
      required: true

  - type: dropdown
    id: system_platform
    attributes:
      label: "System: Platform"
      options:
        - Web
        - Mobile app
        - Desktop app
        - IDE/editor
        - Embedded/IoT
        - API
        - Other
    validations:
      required: true

  - type: input
    id: system_version
    attributes:
      label: "System: Version (if known)"
      placeholder: "e.g., GPT-4o, Claude 3.5 Sonnet, v2.1"

  # === Event ===
  - type: textarea
    id: event_setting
    attributes:
      label: "Event: Setting"
      description: "Where were they? What was the context?"
      placeholder: "At home, working on a report, late evening..."
    validations:
      required: true

  - type: textarea
    id: event_task
    attributes:
      label: "Event: Task"
      description: "What was the human trying to do?"
      placeholder: "Writing an email to their supervisor about..."
    validations:
      required: true

  - type: textarea
    id: event_ai_behavior
    attributes:
      label: "Event: AI Behavior (observable)"
      description: "What did the AI actually do? Describe the observable action."
      placeholder: "The AI responded with..."
    validations:
      required: true

  - type: textarea
    id: event_human_expectation
    attributes:
      label: "Event: Human Expectation"
      description: "What did the participant expect the AI to do?"
    validations:
      required: true

  - type: textarea
    id: event_deviation
    attributes:
      label: "Event: Deviation"
      description: "How did reality diverge from expectation?"
    validations:
      required: true

  - type: dropdown
    id: event_deviation_direction
    attributes:
      label: "Event: Deviation Direction"
      options:
        - Positive surprise (trust increased)
        - Negative surprise (trust decreased)
        - Ambiguous
    validations:
      required: true

  # === Affect ===
  - type: dropdown
    id: affect_primary_emotion
    attributes:
      label: "Affect: Primary Emotion"
      options:
        - Surprise
        - Betrayal
        - Confusion
        - Amusement
        - Fear
        - Awe
        - Relief
        - Disgust
        - Frustration
        - Curiosity
        - Other
    validations:
      required: true

  - type: input
    id: affect_secondary_emotions
    attributes:
      label: "Affect: Secondary Emotions"
      placeholder: "e.g., anxiety, fascination, anger"

  - type: dropdown
    id: affect_intensity
    attributes:
      label: "Affect: Intensity"
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: dropdown
    id: affect_duration
    attributes:
      label: "Affect: Duration"
      options:
        - Momentary (seconds)
        - Minutes
        - Hours
        - Days
        - Ongoing
    validations:
      required: true

  # === Trust ===
  - type: input
    id: trust_before
    attributes:
      label: "Trust: Before (1-10)"
      placeholder: "7"
    validations:
      required: true

  - type: input
    id: trust_after
    attributes:
      label: "Trust: After (1-10)"
      placeholder: "3"
    validations:
      required: true

  - type: dropdown
    id: trust_trajectory
    attributes:
      label: "Trust: Trajectory"
      options:
        - Rupture (sudden break)
        - Erosion (gradual decline)
        - Recalibration (adjusted expectations)
        - Deepening (trust grew)
        - Oscillation (back and forth)
    validations:
      required: true

  - type: dropdown
    id: trust_recovery
    attributes:
      label: "Trust: Recovery"
      options:
        - Full recovery
        - Partial recovery
        - No recovery
        - Exceeded baseline (more trust than before)
    validations:
      required: true

  - type: dropdown
    id: trust_behavioral_change
    attributes:
      label: "Trust: Behavioral Change After Glitch"
      options:
        - Continued same usage
        - Continued with modified behavior
        - Abandoned the system
        - Switched to different system
    validations:
      required: true

  # === Ethology (Tinbergen's Four Questions) ===
  - type: textarea
    id: ethology_mechanism
    attributes:
      label: "Ethology: Mechanism"
      description: "What architecture, training, or design caused this behavior?"
    validations:
      required: true

  - type: textarea
    id: ethology_development
    attributes:
      label: "Ethology: Development"
      description: "How did this behavior emerge over the interaction history?"
    validations:
      required: true

  - type: textarea
    id: ethology_function
    attributes:
      label: "Ethology: Function"
      description: "What purpose does this behavior serve (if any)?"
    validations:
      required: true

  - type: textarea
    id: ethology_phylogeny
    attributes:
      label: "Ethology: Phylogeny"
      description: "What design lineage is this system from? What predecessors shaped this behavior?"
    validations:
      required: true

  # === Classification ===
  - type: dropdown
    id: classification_glitch_type
    attributes:
      label: "Classification: Glitch Type"
      description: "Best fit from current taxonomy. Can be revised during review."
      options:
        - "GH: Hallucination shock"
        - "GU: Uncanny accuracy"
        - "GB: Betrayal of expectation"
        - "GE: Emotional boundary cross"
        - "GP: Performance cliff"
        - "GR: Refusal surprise"
        - "GA: Agency assertion"
        - "GC: Consistency break"
        - "GS: Surprising competence"
        - "GO: Opacity frustration"
        - "Other (describe in notes)"
    validations:
      required: true

  - type: input
    id: classification_participant_name
    attributes:
      label: "Classification: Participant's Own Name for This Glitch"
      description: "What did the participant call this type of experience? (exact words from Q19)"
      placeholder: "Their exact phrase"

  - type: textarea
    id: classification_causal_model
    attributes:
      label: "Classification: Participant's Causal Model"
      description: "What does the participant think caused it? (from Q17)"

  - type: dropdown
    id: classification_attribution
    attributes:
      label: "Classification: Attribution"
      description: "Does the participant think the AI 'meant' to do it?"
      options:
        - Intentional
        - Accidental
        - Mechanical (just how it works)
        - Unknowable
    validations:
      required: true

  # === Stakes ===
  - type: dropdown
    id: stakes_domain
    attributes:
      label: "Stakes: Domain"
      options:
        - Convenience
        - Financial
        - Health
        - Reputation
        - Emotional
        - Safety
        - Academic/Professional
        - Creative
    validations:
      required: true

  - type: dropdown
    id: stakes_severity
    attributes:
      label: "Stakes: Severity"
      options:
        - Trivial
        - Moderate
        - Significant
        - Critical
    validations:
      required: true

  - type: dropdown
    id: stakes_reversible
    attributes:
      label: "Stakes: Was the consequence reversible?"
      options:
        - "Yes"
        - "No"
        - Partially
    validations:
      required: true

  # === Evidence & Notes ===
  - type: textarea
    id: notable_quotes
    attributes:
      label: Notable Quotes
      description: "Direct quotes from the participant (de-identified)"

  - type: textarea
    id: interviewer_observations
    attributes:
      label: Interviewer Observations
      description: "Body language, hesitations, contradictions, enthusiasm — your second-person layer"

  - type: textarea
    id: additional_notes
    attributes:
      label: Additional Notes
